name: CI Pipeline
on:
    push:
        branches: [ "main" ]

    workflow_dispatch:

env:
    NODE_VERSION: "20"

jobs:
    lint-frontend:
        name: Frontend - Lint
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: "npm"
                  cache-dependency-path: "UI/frontend/package-lock.json"
            - run: npm ci
              working-directory: UI/frontend
            - run: npm run lint
              working-directory: UI/frontend

    build-frontend:
        name: Frontend - Build
        runs-on: ubuntu-latest
        needs: [ lint-frontend ]
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: "npm"
                  cache-dependency-path: "package-lock.json"
            - run: npm ci
              working-directory: .
            - run: npm run build
              working-directory: .
