name: Security Scan & Build

on:
    push:
        branches:
            - development
            - main
            - dev-*
    pull_request:
        branches:
            - development
            - main
            - dev-*
    schedule:
        - cron: "0 2 * * 0"

env:
    REGISTRY: ghcr.io
    IMAGE_NAME: ${{ github.repository }}

jobs:
    secrets-scan:
        name: Scan for Secrets and Credentials
        runs-on: ubuntu-latest
        permissions:
            contents: read
            security-events: write
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Scan for secrets using TruffleHog
              uses: trufflesecurity/trufflehog@main
              with:
                  path: ./
                  head: ${{ github.sha }}
                  extra_args: --debug --json

            - name: Install GitLeaks
              run: |
                  curl -sSfL https://raw.githubusercontent.com/gitleaks/gitleaks/master/install.sh | sudo sh -s -- -b /usr/local/bin

            - name: Scan repository with GitLeaks
              run: gitleaks detect --source . --report-format json --report-path
                  gitleaks-report.json

            - name: Upload GitLeaks report
              uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: gitleaks-report
                  path: gitleaks-report.json

    codeql-analysis:
        name: CodeQL Static Analysis
        runs-on: ubuntu-latest
        permissions:
            contents: read
            security-events: write
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Initialize CodeQL
              uses: github/codeql-action/init@v2
              with:
                  languages: javascript
                  queries: security-and-quality

            - name: Autobuild
              uses: github/codeql-action/autobuild@v2

            - name: Perform CodeQL Analysis
              uses: github/codeql-action/analyze@v2
              with:
                  category: /language:javascript

    dependency-check:
        name: Check Node.js Dependencies
        runs-on: ubuntu-latest
        permissions:
            contents: read
            security-events: write
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"

            - name: Install dependencies
              run: npm ci

            - name: Run npm audit
              run: npm audit --json > npm-audit-report.json || true

            - name: Upload npm audit report
              uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: npm-audit-report
                  path: npm-audit-report.json

    code-quality:
        name: Code Quality & Linting
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"

            - name: Install dependencies
              run: npm ci

            - name: Run ESLint
              run: npx eslint . --format json --output-file eslint-report.json || true

            - name: Run Prettier check
              run: npx prettier --check . || true

            - name: Upload ESLint report
              uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: eslint-report
                  path: eslint-report.json

    semgrep-analysis:
        name: Semgrep Code Scanning
        runs-on: ubuntu-latest
        permissions:
            contents: read
            security-events: write
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v4
              with:
                  python-version: "3.13"

            - name: Install Semgrep
              run: pip install semgrep

            - name: Run Semgrep
              run: semgrep --config p/javascript --config p/nextjs --json --output
                  semgrep-report.json . || true

            - name: Upload Semgrep report
              uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: semgrep-report
                  path: semgrep-report.json

    build-and-scan:
        name: Build & Scan Docker Image
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
            security-events: write
        needs:
            - secrets-scan
            - code-quality
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v2

            - name: Log in to Container Registry
              if: github.event_name != 'pull_request'
              uses: docker/login-action@v2
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract Docker metadata
              id: meta
              uses: docker/metadata-action@v4
              with:
                  images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
                  tags: |
                      type=ref,event=branch
                      type=semver,pattern={{version}}
                      type=sha,prefix=
                      type=raw,value=${{ github.sha }}

            - name: Build Docker image for scanning
              uses: docker/build-push-action@v4
              with:
                  context: .
                  file: ./Dockerfile
                  push: false
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  outputs: type=docker,dest=/tmp/image.tar

            - name: Load Docker image
              run: docker load --input /tmp/image.tar

            - name: Scan image with Trivy
              uses: aquasecurity/trivy-action@master
              with:
                  input: "/tmp/image.tar"
                  format: "sarif"
                  output: "trivy-results.sarif"
                  severity: "CRITICAL,HIGH"

            - name: Upload Trivy scan results
              uses: github/codeql-action/upload-sarif@v2
              if: always()
              with:
                  sarif_file: "trivy-results.sarif"
                  category: "trivy"

            - name: Scan image with Grype
              uses: anchore/scan-action@v3
              id: grype
              with:
                  path: "/tmp/image.tar"
                  fail-build: false

            - name: Upload Grype results
              uses: github/codeql-action/upload-sarif@v2
              if: always()
              with:
                  sarif_file: ${{ steps.grype.outputs.sarif }}

            - name: Push Docker image
              if: github.event_name != 'pull_request'
              uses: docker/build-push-action@v4
              with:
                  context: .
                  file: ./Dockerfile
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  platforms: linux/amd64,linux/arm64

    security-summary:
        name: Security Scan Summary
        runs-on: ubuntu-latest
        needs:
            - secrets-scan
            - codeql-analysis
            - dependency-check
            - code-quality
            - build-and-scan
            - semgrep-analysis
        if: always()
        steps:
            - name: Print summary
              run: |
                  echo "=== Security Scan Summary ==="
                  echo "Scans performed:"
                  echo "  ✓ Secret scanning (TruffleHog + GitLeaks)"
                  echo "  ✓ Static analysis (CodeQL - JavaScript/TypeScript)"
                  echo "  ✓ Dependency audit (npm audit)"
                  echo "  ✓ Code quality (ESLint + Prettier)"
                  echo "  ✓ Docker image scanning (Trivy + Grype)"
                  echo "  ✓ SAST pattern scanning (Semgrep)"
