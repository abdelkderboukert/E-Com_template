# Global Variables
global:
  environment: production
  awsRegion: us-east-1
  s3BucketName: your-production-data-bucket
  awsIamRoleArn: arn:aws:iam::123456789012:role/OilGasEksAccessRole

# Frontend (Next.js)
frontend:
  image: your-docker-repo/nextjs-frontend:latest
  port: 3000
  hpa:
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"